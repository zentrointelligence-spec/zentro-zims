# =============================================================================
# Zentro-ZIMS — Default Virtual Host
# =============================================================================
# Routes:
#   /health          → API (no rate limit — used by load balancers)
#   /api/*           → API with rate limiting
#   /uploads/*       → Static file serving
#   /docs /redoc/*   → API documentation
#   everything else  → Next.js frontend (when proxied together)
# =============================================================================

server {
    listen 80;
    server_name _;
    charset utf-8;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Client max body size (10MB for document uploads)
    client_max_body_size 10M;

    # -------------------------------------------------------------------------
    # Health check — passthrough to API without rate limiting
    # -------------------------------------------------------------------------
    location = /health {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # -------------------------------------------------------------------------
    # API routes — rate limited
    # -------------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # -------------------------------------------------------------------------
    # Auth endpoints — stricter rate limit
    # -------------------------------------------------------------------------
    location ~ ^/api/v1/auth/(register|login|refresh|forgot-password) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # -------------------------------------------------------------------------
    # API docs
    # -------------------------------------------------------------------------
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # Static uploads
    # -------------------------------------------------------------------------
    location /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # Next.js frontend (Phase 1: disabled; enable when frontend is Dockerized)
    # Uncomment when the Next.js app is added to docker-compose.
    # -------------------------------------------------------------------------
    # location / {
    #     proxy_pass http://web:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # -------------------------------------------------------------------------
    # Default root — return API info
    # -------------------------------------------------------------------------
    location = / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
