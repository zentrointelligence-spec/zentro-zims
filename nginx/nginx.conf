# =============================================================================
# Zentro-ZIMS — Nginx Reverse Proxy Configuration
# =============================================================================
# Layers:
#   1. Rate limiting zone
#   2. Gzip compression
#   3. Upstream API backend
#   4. Health check passthrough
#   5. Static upload serving
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # Rate limiting — 100 req/min per IP for API
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    # Stricter limit for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # Upstream: FastAPI backend
    upstream api_backend {
        least_conn;
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Include virtual host configs
    include /etc/nginx/conf.d/*.conf;
}
