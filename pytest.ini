# =============================================================================
# Zentro-ZIMS — Pytest Configuration
# =============================================================================
# Usage:
#   pytest              # Run all tests
#   pytest -xvs         # Verbose, stop on first failure
#   pytest --cov=app    # With coverage
# =============================================================================

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async test support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Display settings
addopts =
    -ra
    --strict-markers
    --tb=short

# Custom markers (use @pytest.mark.slow, @pytest.mark.integration, etc.)
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (require Docker services)
    unit: marks tests as pure unit tests (no external dependencies)
    e2e: marks tests as end-to-end browser tests

# Environment defaults for test runs
env =
    APP_ENV=testing
    DATABASE_URL=sqlite:///./test_zims.db
    SECRET_KEY=test-secret-key-must-be-32-chars-long
    REDIS_URL=redis://localhost:6379/1
    CELERY_BROKER_URL=redis://localhost:6379/1
    CELERY_RESULT_BACKEND=redis://localhost:6379/1
    RUN_ALEMBIC_ON_STARTUP=false
